<div class="auth-container">
  <div class="auth-card">
    <h2>Autentificare AutoPaints</h2>

    <!-- Success message display -->
    <div *ngIf="successMessage" class="alert-success">
      {{ successMessage }}
    </div>

    <!-- Login form -->
    <form (ngSubmit)="onSubmit()">
      <!-- Username -->
      <div class="form-group">
        <label for="username">Nume de utilizator</label>
        <input type="text"
               id="username"
               class="form-control"
               [(ngModel)]="Username"
               name="username"
               required
               placeholder="Introdu numele de utilizator" />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Parola</label>
        <input type="password"
               id="password"
               class="form-control"
               [(ngModel)]="Password"
               name="password"
               required
               placeholder="Introdu parola" />
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn">Autentificare</button>
    </form>

    <!-- Display Role (if logged in) -->
    <div *ngIf="Role" class="role-info">
      <p>Autentificat ca: <strong>{{ Role }}</strong></p>
    </div>

    <!-- Display error message below the form -->
    <div *ngIf="errorMessage" class="form-error-message">
      {{ errorMessage }}
    </div>

    <p class="register-link">
      Nu ai cont? <a routerLink="/register">Inregistrare</a>
    </p>
    <p class="register-link">
      <a (click)="toggleForgotPassword()" style="cursor:pointer;">Ai uitat parola?</a>
    </p>

    <div *ngIf="showForgotPassword">
      <div class="form-group">
        <label>Username</label>
        <input [(ngModel)]="usernameForReset" class="form-control" placeholder="Username" />
      </div>
      <button class="btn" (click)="sendVerificationCode()">Trimite codul pe email</button>
      <p *ngIf="emailSentMessage">{{ emailSentMessage }}</p>

      <div *ngIf="codeSent && !codeVerified" class="form-group">
        <label>Cod primit</label>
        <input [(ngModel)]="userInputCode" class="form-control" placeholder="Cod" />
        <button class="btn" (click)="verifyCode()">Verifică codul</button>
      </div>

      <div *ngIf="codeVerified">
        <div class="form-group">
          <label>Parolă nouă</label>
          <input [(ngModel)]="newPassword" type="password" class="form-control" />
        </div>
        <div class="form-group">
          <label>Confirmare parolă</label>
          <input [(ngModel)]="confirmPassword" type="password" class="form-control" />
        </div>
        <button class="btn" (click)="resetPassword()">Resetează parola</button>
      </div>
    </div>

  </div>






</div>
