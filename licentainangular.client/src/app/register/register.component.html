<div class="auth-container">
  <div class="auth-card">
    <h2>Register for Car Painting Store</h2>
    <form (ngSubmit)="onSubmit()">
      <!-- Username -->
      <div class="form-group">
        <label for="username">Nume de Utilizator <span style="color: red;">*</span></label>
        <input type="text"
               id="username"
               class="form-control"
               [(ngModel)]="User.Username"
               name="username"
               required
               placeholder="Nume de Utilizator" />
      </div>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email <span style="color: red;">*</span></label>
        <input type="email"
               id="email"
               class="form-control"
               [(ngModel)]="User.Persoana.Email"
               name="email"
               required
               placeholder="Introduceți email-ul" />
      </div>

      <!-- Phone (Optional) -->
      <div class="form-group">
        <label for="telefon">Telefon (opțional)</label>
        <input type="text"
               id="telefon"
               class="form-control"
               [(ngModel)]="User.Persoana.Telefon"
               name="telefon"
               placeholder="Introduceți numărul de telefon" />
      </div>

      <!-- Tip Persoana -->
      <div class="form-group">
        <label for="tipPersoana">Tip Persoana <span style="color: red;">*</span></label>
        <select id="tipPersoana"
                class="form-control"
                [(ngModel)]="User.Persoana.tipPersoana"
                name="tipPersoana"
                required>
          <option value="Fizica">Persoană Fizică</option>
          <option value="Juridica">Persoană Juridică</option>
        </select>
      </div>

      <!-- For Persoana Fizica -->
      <ng-container *ngIf="User.Persoana.tipPersoana === 'Fizica'">
        <div class="form-group">
          <label for="nume">Nume <span style="color: red;">*</span></label>
          <input type="text"
                 id="nume"
                 class="form-control"
                 [(ngModel)]="User.Persoana.Nume"
                 name="nume"
                 required
                 placeholder="Introduceți numele" />
        </div>
        <div class="form-group">
          <label for="prenume">Prenume <span style="color: red;">*</span></label>
          <input type="text"
                 id="prenume"
                 class="form-control"
                 [(ngModel)]="User.Persoana.Prenume"
                 name="prenume"
                 required
                 placeholder="Introduceți prenumele" />
        </div>
      </ng-container>

      <!-- For Persoana Juridica -->
      <ng-container *ngIf="User.Persoana.tipPersoana === 'Juridica'">
        <div class="form-group">
          <label for="nume">Numele Firmei <span style="color: red;">*</span></label>
          <input type="text"
                 id="nume"
                 class="form-control"
                 [(ngModel)]="User.Persoana.Nume"
                 name="nume"
                 required
                 placeholder="Introduceți numele firmei" />
        </div>
        <div class="form-group">
          <label for="prenume">Forma Juridică <span style="color: red;">*</span></label>
          <select id="prenume"
                  class="form-control"
                  [(ngModel)]="User.Persoana.Prenume"
                  name="prenume"
                  required>
            <option value="SRL">SRL</option>
            <option value="SA">SA</option>
          </select>
        </div>
      </ng-container>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Parola <span style="color: red;">*</span></label>
        <input type="password"
               id="password"
               class="form-control"
               [(ngModel)]="User.Password"
               name="password"
               required
               placeholder="Introduceți parola" />
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn">Register</button>
    </form>

    <!-- Validation Message -->
    <p *ngIf="formInvalid" class="form-error-message">
      Please fill in all required fields.
    </p>

    <p class="login-link">
      Aveți deja cont? <a routerLink="/authentification">Login</a>
    </p>
  </div>
</div>
